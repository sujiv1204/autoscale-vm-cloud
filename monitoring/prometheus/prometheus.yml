global:
    scrape_interval: 15s
    evaluation_interval: 15s
    external_labels:
        monitor: "local-vm-monitor"

scrape_configs:
    # Prometheus itself
    - job_name: "prometheus"
      static_configs:
          - targets: ["localhost:9090"]

    # Node Exporter - System metrics
    - job_name: "node-exporter"
      static_configs:
          - targets: ["node-exporter:9100"]
            labels:
                instance: "local-vm"
                environment: "local"

    # Docker containers metrics (if Docker exposes metrics)
    - job_name: "docker"
      static_configs:
          - targets: ["host.docker.internal:9323"]
      # This may not work if Docker metrics aren't exposed
      # It's optional for this project
